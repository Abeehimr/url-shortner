<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Analytics — SHRTN</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .clicks-chart {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-top: 1.5rem;
    }

    .clicks-chart h3 {
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.6rem;
      font-size: 0.75rem;
    }

    .bar-row .bar-label {
      width: 90px;
      color: var(--muted);
      flex-shrink: 0;
      text-align: right;
    }

    .bar-track {
      flex: 1;
      height: 8px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }

    .bar-count {
      width: 40px;
      color: var(--text);
      text-align: right;
      flex-shrink: 0;
    }

    .no-data {
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
      padding: 1.5rem 0;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">SHR<span>TN</span></a>
  <a href="index.html">Create</a>
  <a href="edit.html">Edit</a>
  <a href="delete.html">Delete</a>
  <a href="analytics.html">Analytics</a>
</nav>

<main>
  <div class="page-header">
    <span class="tag">/ analytics</span>
    <h1>Link Analytics</h1>
    <p>View click stats and metadata for any short URL.</p>
  </div>

  <div class="form-group">
    <label for="lookup-code">Shortcode</label>
    <input type="text" id="lookup-code" placeholder="e.g. my-link" />
  </div>

  <button class="btn btn-primary" id="lookup-btn">
    <span id="lookup-text">Fetch Analytics</span>
  </button>

  <div class="alert" id="lookup-alert"></div>

  <!-- Analytics dashboard -->
  <div id="analytics-section" style="display:none">
    <hr class="divider"/>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-value" id="stat-clicks">—</div>
        <div class="stat-label">Total Clicks</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="stat-created">—</div>
        <div class="stat-label">Created</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="last-updated">—</div>
        <div class="stat-label">Last Updated</div>
      </div>
    </div>

    <div class="url-info-block">
      <div class="info-label">Shortcode</div>
      <div class="info-value accent" id="info-code">—</div>
    </div>

    <div class="url-info-block">
      <div class="info-label">Destination URL</div>
      <div class="info-value" id="info-url">—</div>
    </div>

    <!-- Clicks by day chart (rendered if data available) -->
    <div class="clicks-chart" id="chart-section" style="display:none">
      <h3>Clicks over time</h3>
      <div id="chart-bars"></div>
    </div>
  </div>
</main>

<footer>SHRTN &mdash; URL Shortener</footer>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script>
  const lookupBtn       = document.getElementById("lookup-btn");
  const lookupText      = document.getElementById("lookup-text");
  const lookupAlert     = document.getElementById("lookup-alert");
  const analyticsSection = document.getElementById("analytics-section");

  lookupBtn.addEventListener("click", async () => {
    const code = document.getElementById("lookup-code").value.trim();
    if (!code) return showAlert(lookupAlert, "Enter a shortcode.", "error");

    hideAlert(lookupAlert);
    analyticsSection.style.display = "none";
    lookupBtn.disabled = true;
    lookupText.innerHTML = '<span class="spinner"></span> Loading...';

    try {
      const res  = await fetch(`${API}/${code}/stats`);
      const data = await res.json();

      if (res.ok) {
        renderAnalytics(code, data);
        analyticsSection.style.display = "block";
      } else {
        showAlert(lookupAlert, data.detail || "Shortcode not found.", "error");
      }
    } catch {
      showAlert(lookupAlert, "Could not reach the server.", "error");
    } finally {
      lookupBtn.disabled = false;
      lookupText.textContent = "Fetch Analytics";
    }
  });

  function renderAnalytics(code, data) {
    // Stats
    document.getElementById("stat-clicks").textContent =
      data.clicks ?? data.accessCount ?? data.clickCount ?? "—";

    document.getElementById("stat-created").textContent =
      data.createdAt ? formatDate(data.createdAt) : "—";

    document.getElementById("last-updated").textContent =
      data.updatedAt ? formatDate(data.updatedAt) : "—";

    document.getElementById("info-code").textContent = code;
    document.getElementById("info-url").textContent =
      data.url || data.originalUrl || "—";

    // Optional: clicks by day chart
    const clicksByDay = data.clicksByDay || data.clicks_by_day;
    const chartSection = document.getElementById("chart-section");
    const chartBars    = document.getElementById("chart-bars");

    if (clicksByDay && Object.keys(clicksByDay).length > 0) {
      chartSection.style.display = "block";
      const entries = Object.entries(clicksByDay).sort(([a], [b]) => a.localeCompare(b)).slice(-10);
      const max = Math.max(...entries.map(([, v]) => v), 1);

      chartBars.innerHTML = entries.map(([date, count]) => `
        <div class="bar-row">
          <span class="bar-label">${formatShortDate(date)}</span>
          <div class="bar-track">
            <div class="bar-fill" style="width:${(count / max) * 100}%"></div>
          </div>
          <span class="bar-count">${count}</span>
        </div>
      `).join("");

      // Animate bars after paint
      requestAnimationFrame(() => {
        document.querySelectorAll(".bar-fill").forEach(el => {
          el.style.width = el.style.width; // trigger reflow
        });
      });
    } else {
      chartSection.style.display = "none";
    }
  }

  function formatDate(iso) {
    try {
      return new Date(iso).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "2-digit", hour: "2-digit", minute: "2-digit" });
    } catch { return "—"; }
  }

  function formatShortDate(str) {
    try {
      return new Date(str).toLocaleDateString(undefined, { month: "short", day: "numeric" });
    } catch { return str; }
  }
</script>
</body>
</html>
